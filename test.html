<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Chord Sheet</title>
  <style>

/* -------------------------------------------------------
   Selectors:
     .sheet              outermost wrapper
     .section            one line of music
     .spacer             blank-line gap between sections
     .measure            one bar (inline-block, never breaks)
     .measure.repeat-open    left side is |:
     .measure.repeat-close   right side is :|
     .measure.final          right side is ||
     .dots               repeat colon sitting inside the barline
     .ending             volta number e.g. 1  2
     .chord              individual chord symbol
------------------------------------------------------- */

@page { size: A4; margin: 25mm; }

body {
  font-family: Helvetica, Arial, sans-serif;
  background: white;
}

.sheet {
  /* outermost wrapper */
}

.section {
  margin-bottom: 1em;
}

.spacer {
  /* height: 36pt; */
}

/* ---- each measure is an unbreakable inline block ---- */
.measure {
  display: inline-block;
  position: relative;
  height: 26pt;
  line-height: 26pt;
  padding: 0 16pt 0 16pt;
  margin-right: -2px;
  margin-bottom: 14pt;
  border-left:  2.5px solid black;
  border-right: 2.5px solid black;
  font-size: 17pt;
  font-weight: bold;
  font-family: 'Courier New', monospace;
  min-width: 44pt;
  vertical-align: middle;
  white-space: nowrap;
  box-sizing: border-box;
}

/* ---- repeat colon ---- */
/* .dots is a simple ":" sitting just inside the barline.
   It is absolutely positioned so you can move it
   independently of the chord content.
   - "left" / "right" controls its distance from the barline.
   - "font-size" controls its size.
   The chord spacing is controlled purely by the
   padding-left / padding-right of .measure.repeat-open/close. */

.dots {
  position: absolute;
  top: 50%;
  transform: translateY(-55%);
  font-size: 20pt;
  font-weight: bold;
  line-height: 1;
}

.measure.repeat-open .dots  { left: -1pt; }   /* distance from left barline */
.measure.repeat-close .dots { right: -1pt; }  /* distance from right barline */

.measure.repeat-open {
  padding-left: 20pt;   /* push chord away from barline+colon */
}

.measure.repeat-close {
  padding-right: 20pt;  /* push chord away from barline+colon */
}

/* ---- final double barline ---- */
.measure.final {
  border-right: 9px double black;
  margin-right: 0;
}

/* ---- volta number 1  2 ---- */
.ending {
  font-size: 10pt;
  font-weight: bold;
  padding: 1pt 2pt 0 2pt;
  margin: 0 8pt 0 -12pt;
  background-color: black;
  color: white;
}

.chord {
  color: black;
}
  </style>
</head>
<body>
<div class="sheet">
<div class="section"><span class="measure"><span class="chord">A</span></span><span class="measure"><span class="chord">E7</span></span><span class="measure repeat-open"><span class="dots">:</span><span class="chord">A</span></span><span class="measure"><span class="chord">A7</span></span><span class="measure"><span class="chord">D</span> <span class="chord">D#o</span></span><span class="measure"><span class="ending">1</span><span class="chord">A</span></span><span class="measure repeat-close"><span class="chord">Bm</span> <span class="chord">E7</span><span class="dots">:</span></span><span class="measure"><span class="ending">2</span><span class="chord">A</span> <span class="chord">E7</span></span><span class="measure final"><span class="chord">A</span></span></div>
<div class="section"><span class="measure"><span class="chord">C#7</span></span><span class="measure"><span class="chord">F#m</span></span><span class="measure"><span class="chord">Bm</span></span><span class="measure"><span class="chord">C#7</span></span><span class="measure final"><span class="chord">F#m</span></span></div>
</div>
</body>
</html>
